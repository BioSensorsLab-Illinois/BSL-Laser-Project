name: BSLRemote
options:
  bundleIdPrefix: cc.metadata.bsl
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
packages:
  BSLProtocol:
    path: BSLProtocol
targets:
  BSLRemote:
    type: application
    platform: iOS
    sources:
      - path: BSLRemote
        excludes:
          - "Resources/Info.plist"
          - "Resources/BSLRemote.entitlements"
    resources:
      - BSLRemote/Resources
    dependencies:
      - package: BSLProtocol
        product: BSLProtocol
    info:
      path: BSLRemote/Resources/Info.plist
      properties:
        CFBundleDisplayName: BSLRemote
        CFBundleIdentifier: cc.metadata.bsl.remote
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
          - wifi
        NSLocalNetworkUsageDescription: "BSLRemote talks to the BSL laser controller over Wi-Fi on 192.168.4.1 or the configured station IP."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSFaceIDUsageDescription: "Unused in this build; reserved for a future biometric reprompt."
    entitlements:
      path: BSLRemote/Resources/BSLRemote.entitlements
      properties:
        com.apple.developer.networking.HotspotConfiguration: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cc.metadata.bsl.remote
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: BSLRemote/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: BSLRemote/Resources/BSLRemote.entitlements
